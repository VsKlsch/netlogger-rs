name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            libbpf-dev \
            libelf-dev \
            zlib1g-dev \
            build-essential \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: |
          cargo build --release --bin netlogger-gui
          cargo build --release --bin netlogger-cli

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/netlogger-gui
            target/release/netlogger-cli
          generate_release_notes: true